snapshot_path = "snapshots/auth_snapshot.bin"
web_host = "https://auth.frkn.org"
listen = "127.0.0.1"
port = 3005
email_file = "users_trials.csv"

[node]
env = "auth"
uuid = "ab514c21-aaaa-bbbb-91f7-32f8cb1aaaaa"
